name: index

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python3 gen_index.py
      - run: |
          git config user.name "index-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.json
          git diff --cached --quiet || (git commit -m "regenerate index" && git push)
